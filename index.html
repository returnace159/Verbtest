<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Verb Master - Full Version</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; width: 100%; max-width: 480px; border-radius: 32px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .container { padding: 28px 24px 32px; }
        .title { font-size: 2rem; font-weight: 700; color: #0f172a; text-align: center; }
        .sub { text-align: center; color: #475569; font-weight: 500; margin: 4px 0 28px; font-size: 0.9rem; }
        .list-btn { width: 100%; background: white; border: 1.5px solid #2563eb; border-radius: 60px; padding: 16px 20px; margin-bottom: 14px; text-align: center; font-weight: 700; font-size: 1.2rem; color: #1e40af; cursor: pointer; transition: 0.15s; }
        .list-btn:hover { background: #eff6ff; transform: translateY(-1px); }
        .badge { display: block; font-size: 0.7rem; font-weight: normal; color: #64748b; margin-top: 6px; }
        .score { background: #eef2ff; padding: 12px; border-radius: 40px; text-align: center; font-weight: 600; margin-bottom: 24px; font-size: 0.9rem; color: #2563eb; }
        .verb-card { background: #2563eb; color: white; padding: 30px 15px; border-radius: 28px; font-size: 1.8rem; font-weight: 700; text-align: center; margin-bottom: 12px; }
        .meaning { text-align: center; font-style: italic; color: #334155; margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { background: white; border: 1.5px solid #cbd5e1; padding: 14px; border-radius: 60px; font-weight: 600; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .correct { background: #16a34a !important; border-color: #16a34a !important; color: white !important; }
        .wrong { background: #dc2626 !important; border-color: #dc2626 !important; color: white !important; }
        .example { background: #f0fdf4; border-left: 4px solid #16a34a; padding: 15px; border-radius: 16px; margin-top: 15px; display: none; }
        .next { background: #0f172a; color: white; border: none; width: 100%; padding: 16px; border-radius: 60px; font-weight: bold; margin-top: 18px; cursor: pointer; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="card">
    <div class="container">
        <div id="home">
            <div class="title">🇩🇪 Verb Master</div>
            <div class="sub">Präpositionen: Akk / Dat</div>
            <div class="list-btn" onclick="startQuiz('first')">📘 Liste 1<span class="badge">warten · denken · teilnehmen</span></div>
            <div class="list-btn" onclick="startQuiz('second')">📗 Liste 2<span class="badge">sich erinnern · ankommen</span></div>
        </div>

        <div id="quiz" class="hidden">
            <div id="scoreText" class="score">Soru: 0 / 0</div>
            <div id="verb" class="verb-card">-</div>
            <div id="mean" class="meaning"></div>
            <div id="options" class="grid"></div>
            <div id="fb" style="text-align:center; margin: 15px 0;"></div>
            <div id="exampleBox" class="example"><div id="exDe"></div><div id="exEn" style="font-size:0.8rem; color:#666;"></div></div>
            <button id="nextBtn" class="next" onclick="nextQuestion()">DEVAM ET →</button>
        </div>

        <div id="result" class="hidden">
            <div class="title">Bitti! 🎉</div>
            <div id="finalScore" style="font-size:2rem; text-align:center; margin:20px 0;"></div>
            <button onclick="location.reload()" class="list-btn">TEKRAR BAŞLA</button>
        </div>
    </div>
</div>

<script>
    const list1 = [
        {f:"warten", p:"auf", k:"Akk", t:"beklemek", ex_de:"Ich warte auf dich.", ex_en:"I am waiting for you."},
        {f:"denken", p:"an", k:"Akk", t:"düşünmek", ex_de:"Ich denke an dich.", ex_en:"I am thinking about you."},
        {f:"teilnehmen", p:"an", k:"Dat", t:"katılmak", ex_de:"Ich nehme an dem Kurs teil.", ex_en:"I participate in the course."}
    ];
    const list2 = [
        {f:"ankommen", p:"auf", k:"Akk", t:"bağlı olmak", ex_de:"Es kommt auf dich an.", ex_en:"It depends on you."},
        {f:"sich freuen", p:"auf", k:"Akk", t:"dört gözle beklemek", ex_de:"Ich freue mich auf den Urlaub.", ex_en:"I look forward to the holiday."}
    ];

    let activeQ = [], qIdx = 0, score = 0;

    function startQuiz(type) {
        activeQ = (type === 'first' ? list1 : list2).sort(() => Math.random() - 0.5);
        document.getElementById('home').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQ();
    }

    function showQ() {
        const item = activeQ[qIdx];
        document.getElementById('verb').innerText = item.f;
        document.getElementById('mean').innerText = item.t;
        document.getElementById('scoreText').innerText = `Soru: ${qIdx + 1} / ${activeQ.length}`;
        document.getElementById('fb').innerText = "";
        document.getElementById('exampleBox').style.display = "none";
        document.getElementById('nextBtn').style.display = "none";
        
        let opts = [item.p, "in", "mit", "über"].sort(() => Math.random() - 0.5);
        const grid = document.getElementById('options');
        grid.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'opt'; b.innerText = o;
            b.onclick = () => {
                document.querySelectorAll('.opt').forEach(btn => btn.disabled = true);
                if(o === item.p) { b.classList.add('correct'); score++; } 
                else { b.classList.add('wrong'); }
                document.getElementById('exDe').innerText = item.ex_de;
                document.getElementById('exEn').innerText = item.ex_en;
                document.getElementById('exampleBox').style.display = "block";
                document.getElementById('nextBtn').style.display = "block";
            };
            grid.appendChild(b);
        });
    }

    function nextQuestion() {
        qIdx++;
        if(qIdx < activeQ.length) showQ();
        else {
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('finalScore').innerText = `Puan: ${score} / ${activeQ.length}`;
        }
    }
</script>
</body>
</html>
