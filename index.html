<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Verb Master v2.0 - Scalability Edition</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; display: flex; justify-content: center; padding: 20px; color: #f8fafc; }
        .card { background: #1e293b; padding: 25px; border-radius: 24px; width: 100%; max-width: 450px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .btn { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; background: #3b82f6; color: white; }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        .opt { background: #334155; color: #f1f5f9; border: 2px solid #475569; margin: 8px 0; text-align: left; padding-left: 20px; }
        .opt:hover { border-color: #3b82f6; background: #3e4e63; }
        .hidden { display: none; }
        .correct { background: #059669 !important; border-color: #10b981 !important; }
        .wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
        #verb { font-size: 28px; text-align: center; margin: 25px 0; font-weight: 800; color: #60a5fa; text-transform: uppercase; letter-spacing: 1px; }
        #score-text { text-align: center; font-size: 14px; color: #94a3b8; margin-bottom: 10px; }
        #ex-box { margin-top: 20px; padding: 15px; border-radius: 12px; background: #0f172a; border-left: 5px solid #10b981; font-size: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <div id="home">
        <h2 style="text-align:center; margin-bottom:30px;">🇩🇪 DEUTSCHE VERBEN PRO</h2>
        <div id="menu-buttons">
            </div>
    </div>

    <div id="quiz" class="hidden">
        <div id="score-text"></div>
        <div id="verb"></div>
        <div id="options"></div>
        <div id="ex-box" class="hidden">
            <div id="meaning" style="font-weight: bold; color: #10b981; margin-bottom: 5px;"></div>
            <div id="example" style="font-style: italic; color: #cbd5e1;"></div>
        </div>
        <button id="next" class="btn hidden" onclick="nextQ()" style="background:#f59e0b; margin-top:20px;">SIRADAKİ SORU ➔</button>
    </div>

    <div id="res" class="hidden" style="text-align:center">
        <h2 id="res-title">Test Tamamlandı!</h2>
        <div style="font-size: 48px; margin: 20px 0;" id="total"></div>
        <div id="retryArea"></div>
        <button class="btn" onclick="location.reload()" style="background:#475569">ANA MENÜYE DÖN</button>
    </div>
</div>

<script>
    // Parça 2: Fiil Listesi buraya yapıştırılacak
    const MASTER_DATA = {
"GÜNLÜK HAYAT": [
{f:"warten", p:"auf", t:"beklemek (Akk)", ex:"Ich warte auf dich."},
{f:"denken", p:"an", t:"düşünmek (Akk)", ex:"Denk an mich!"},
{f:"glauben", p:"an", t:"inanmak (Akk)", ex:"Glaubst du an Gott?"},
{f:"sich freuen (auf)", p:"auf", t:"sevinmek-gelecek (Akk)", ex:"Ich freue mich auf den Urlaub."},
{f:"sich freuen (über)", p:"über", t:"sevinmek-şu an (Akk)", ex:"Ich freue mich über das Geschenk."},
{f:"sich interessieren", p:"for", t:"ilgilenmek (Akk)", ex:"Interessierst du dich für Kunst?"},
{f:"sprechen (mit)", p:"mit", t:"konuşmak (Dat)", ex:"Ich spreche mit ihm."},
{f:"sprechen (über)", p:"über", t:"hakkında konuşmak (Akk)", ex:"Wir sprechen über den Film."},
{f:"sich erinnern", p:"an", t:"hatırlamak (Akk)", ex:"Erinnerst du dich an mich?"},
{f:"achten", p:"auf", t:"dikkat etmek (Akk)", ex:"Achte auf die Autos!"},
{f:"antworten", p:"auf", t:"cevap vermek (Akk)", ex:"Antworte auf meine Mail."},
{f:"bitten", p:"um", t:"rica etmek (Akk)", ex:"Darf ich um Hilfe bitten?"},
{f:"danken", p:"für", t:"teşekkür etmek (Akk)", ex:"Ich danke dir für alles."},
{f:"lachen", p:"über", t:"gülmek (Akk)", ex:"Wir lachen über den Witz."},
{f:"hoffen", p:"auf", t:"ummak (Akk)", ex:"Ich hoffe auf Glück."},
{f:"schreiben", p:"an", t:"yazmak (Akk)", ex:"Ich schreibe an den Chef."},
{f:"sich ärgern", p:"über", t:"kızmak (Akk)", ex:"Ärger dich nicht!"},
{f:"sich gewöhnen", p:"an", t:"alışmak (Akk)", ex:"Ich gewöhne mich an das Klima."},
{f:"verzichten", p:"auf", t:"vazgeçmek (Akk)", ex:"Ich verzichte auf Zucker."},
{f:"aufpassen", p:"auf", t:"dikkat etmek/bakmak (Akk)", ex:"Pass auf die Kinder auf!"},
{f:"sich vorbereiten", p:"auf", t:"hazırlanmak (Akk)", ex:"Bereite dich auf den Test vor."}
],
"SOSYAL & İLETİŞİM": [
{f:"teilnehmen", p:"an", t:"katılmak (Dat)", ex:"Nimm am Kurs teil."},
{f:"einladen", p:"zu", t:"davet etmek (Dat)", ex:"Ich lade dich zum Essen ein."},
{f:"gehören", p:"zu", t:"ait olmak (Dat)", ex:"Du gehörst zu uns."},
{f:"passen", p:"zu", t:"uymak/yakışmak (Dat)", ex:"Das passt zu dir."},
{f:"sich unterhalten", p:"mit", t:"sohbet etmek (Dat)", ex:"Wir unterhalten uns mit Tom."},
{f:"sich streiten", p:"mit", t:"kavga etmek (Dat)", ex:"Streite dich nicht!"},
{f:"telefonieren", p:"mit", t:"tel. konuşmak (Dat)", ex:"Ich telefoniere mit ihr."},
{f:"sich treffen", p:"mit", t:"buluşmak (Dat)", ex:"Treffen wir uns mit ihm?"},
{f:"gratulieren", p:"zu", t:"kutlamak (Dat)", ex:"Gratuliere zum Sieg!"},
{f:"helfen", p:"bei", t:"yardım etmek (Dat)", ex:"Hilf mir beim Kochen."},
{f:"fragen", p:"nach", t:"sormak (Dat)", ex:"Er fragt nach dir."},
{f:"erzählen", p:"von", t:"anlatmak (Dat)", ex:"Erzähl von deinem Tag."},
{f:"sich verabreden", p:"mit", t:"randevulaşmak (Dat)", ex:"Ich verabrede mich mit ihr."},
{f:"sich verstehen", p:"mit", t:"anlaşmak (Dat)", ex:"Ich verstehe mich mit ihm gut."},
{f:"sich bedanken", p:"bei", t:"teşekkür etmek (kişiye) (Dat)", ex:"Bedank dich bei deiner Tante."},
{f:"sich beschweren", p:"bei", t:"şikayet etmek (kişiye) (Dat)", ex:"Beschwer dich beim Chef."}
],
"İLERİ SEVİYE & İŞ": [
{f:"ankommen", p:"auf", t:"bağlı olmak (Akk)", ex:"Es kommt auf dich an."},
{f:"sich bewerben", p:"um", t:"başvurmak (Akk)", ex:"Er bewirbt sich um den Job."},
{f:"sich entscheiden", p:"für", t:"karar vermek (Akk)", ex:"Ich entscheide mich für Gold."},
{f:"sich konzentrieren", p:"auf", t:"odaklanmak (Akk)", ex:"Konzentrier dich!"},
{f:"leiden", p:"an", t:"hastalık çekmek (Dat)", ex:"Er leidet an Diabetes."},
{f:"leiden", p:"unter", t:"maruz kalmak (Dat)", ex:"Sie leidet unter dem Lärm."},
{f:"zweifeln", p:"an", t:"şüphe etmek (Dat)", ex:"Zweifle nicht an mir."},
{f:"bestehen", p:"aus", t:"oluşmak (Dat)", ex:"Es besteht aus Holz."},
{f:"bestehen", p:"auf", t:"ısrar etmek (Akk)", ex:"Er besteht auf seinem Gehalt."},
{f:"diskutieren", p:"über", t:"hakkında tartışmak (Akk)", ex:"Wir diskutieren über Geld."},
{f:"berichten", p:"über", t:"rapor etmek (Akk)", ex:"Er berichtet über den Krieg."},
{f:"beitragen", p:"zu", t:"katkıda bulunmak (Dat)", ex:"Trage zum Erfolg bei."},
{f:"forschen", p:"nach", t:"araştırmak (Dat)", ex:"Sie forschen nach ÖL."},
{f:"verfügen", p:"über", t:"sahip olmak (Akk)", ex:"Er verfügt über Wissen."},
{f:"reagieren", p:"auf", t:"tepki vermek (Akk)", ex:"Reagier auf meine Nachricht!"},
{f:"sich spezialisieren", p:"auf", t:"uzmanlaşmak (Akk)", ex:"Er spezialisiert sich auf IT."}
],
"DUYGULAR & ALGI": [
{f:"sich verlieben", p:"in", t:"aşık olmak (Akk)", ex:"Er liebt sich in sie."},
{f:"sich fürchten", p:"vor", t:"korkmak (Dat)", ex:"Ich fürchte mich vor Hunden."},
{f:"träumen", p:"von", t:"hayal etmek (Dat)", ex:"Ich träume von dir."},
{f:"schmecken", p:"nach", t:"tadı gelmek (Dat)", ex:"Es schmeckt nach Salz."},
{f:"riechen", p:"nach", t:"kokmak (Dat)", ex:"Es riecht nach Fisch."},
{f:"sich wundern", p:"über", t:"şaşırmak (Akk)", ex:"Wunder dich nicht."},
{f:"erkennen", p:"an", t:"tanımak (Dat)", ex:"Erkennst du mich am Hut?"},
{f:"sich ekeln", p:"vor", t:"iğrenmek (Dat)", ex:"Ekelst du dich vor Ratten?"},
{f:"sich sehnen", p:"nach", t:"özlemek (Dat)", ex:"Ich sehne mich nach Ruhe."},
{f:"hoffen", p:"auf", t:"ummak (Akk)", ex:"Wir hoffen auf Rettung."}
],
"ZORLU KALIPLAR": [
{f:"sich beschweren", p:"über", t:"şikayet etmek (durumu) (Akk)", ex:"Er beschwert sich über den Lärm."},
{f:"sich kümmern", p:"um", t:"ilgilenmek (Akk)", ex:"Kümmere dich um die Katze."},
{f:"nachdenken", p:"über", t:"düşünmek (derin) (Akk)", ex:"Denk über das Angebot nach."},
{f:"sich verlassen", p:"auf", t:"güvenmek (Akk)", ex:"Verlass dich auf mich."},
{f:"warnen", p:"vor", t:"uyarmak (Dat)", ex:"Ich warne dich vor dem Eis."},
{f:"vergleichen", p:"mit", t:"karşılaştırmak (Dat)", ex:"Vergleich mich nicht mit ihm."},
{f:"sich schützen", p:"vor", t:"korunmak (Dat)", ex:"Schütz dich vor der Sonne."},
{f:"sich trennen", p:"von", t:"ayrılmak (Dat)", ex:"Sie trennt sich von ihm."},
{f:"sich bewerben", p:"bei", t:"başvurmak (şirkete) (Dat)", ex:"Er bewirbt sich bei Google."},
{f:"gehören", p:"zu", t:"ait olmak (parçası) (Dat)", ex:"Das gehört zum Plan."}
]
};
if(typeof buildMenu === "function") buildMenu();

// Scalability Lock Aktivatörü
if(typeof buildMenu === "function") buildMenu(); 

    let current = [], idx = 0, score = 0, wrongList = [];

    // Menüyü dinamik oluştur (Scalability Lock)
    function buildMenu() {
        const menu = document.getElementById('menu-buttons');
        Object.keys(MASTER_DATA).forEach(cat => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = cat + " (" + MASTER_DATA[cat].length + " Fiil)";
            b.onclick = () => start(cat);
            menu.appendChild(b);
        });
    }

    function start(cat) {
        current = [...MASTER_DATA[cat]].sort(() => Math.random() - 0.5);
        idx = 0; score = 0; wrongList = [];
        document.getElementById('home').classList.add('hidden');
        document.getElementById('res').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        show();
    }

    function show() {
        let q = current[idx];
        document.getElementById('score-text').innerText = `İlerleme: ${idx + 1} / ${current.length}`;
        document.getElementById('verb').innerText = q.f;
        document.getElementById('ex-box').classList.add('hidden');
        document.getElementById('next').classList.add('hidden');
        
        // Havuzdan doğru cevabı hariç tutarak rastgele 3 yanlış seçenek seçer
        let pool = ["auf", "an", "mit", "von", "in", "über", "zu", "für", "nach", "um", "vor", "bei", "aus", "gegen"]
                   .filter(p => p !== q.p); // Doğru cevabı havuzdan çıkar
        
        // Havuzu karıştır ve ilk 3 tanesini al
        let wrongOpts = pool.sort(() => Math.random() - 0.5).slice(0, 3);
        
        // Doğru cevapla birleştir ve hepsini tekrar karıştır
        let finalOpts = [q.p, ...wrongOpts].sort(() => Math.random() - 0.5);

        document.getElementById('options').innerHTML = finalOpts.map(o => 
            `<button class="btn opt" onclick="check(this, '${o}', '${q.p}')">${o}</button>`
        ).join('');
    }
    function check(btn, sel, cor) {
        document.querySelectorAll('.opt').forEach(b => b.disabled = true);
        const q = current[idx];
        if(sel === cor) { 
            btn.classList.add('correct'); 
            score++; 
        } else { 
            btn.classList.add('wrong'); 
            wrongList.push(q);
        }
        document.getElementById('meaning').innerText = q.t;
        document.getElementById('example').innerText = q.ex;
        document.getElementById('ex-box').classList.remove('hidden');
        document.getElementById('next').classList.remove('hidden');
    }

    function nextQ() {
        idx++;
        if(idx < current.length) show();
        else finish();
    }

    function finish() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('res').classList.remove('hidden');
        document.getElementById('total').innerText = `${score} / ${current.length}`;
        const retryArea = document.getElementById('retryArea');
        retryArea.innerHTML = ""; 
        if(wrongList.length > 0) {
            const b = document.createElement('button');
            b.className = "btn"; b.style.background = "#ea580c";
            b.innerText = `HATALARI TEKRARLA (${wrongList.length})`;
            b.onclick = () => {
                current = [...wrongList].sort(() => Math.random() - 0.5);
                idx = 0; score = 0; wrongList = [];
                document.getElementById('res').classList.add('hidden');
                document.getElementById('quiz').classList.remove('hidden');
                show();
            };
            retryArea.appendChild(b);
        }
    }

    // Başlangıçta menüyü kur (Veri gelince çalışacak)
    window.onload = () => { if(Object.keys(MASTER_DATA).length > 0) buildMenu(); };
</script>
</body>
</html>
