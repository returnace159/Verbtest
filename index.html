<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Verb Master</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; color: #f1f5f9; }
        .card { background: #1e293b; width: 100%; max-width: 480px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; overflow: hidden; }
        .container { padding: 30px; }
        .title { font-size: 2.2rem; font-weight: 800; color: #38bdf8; text-align: center; }
        .sub { text-align: center; color: #94a3b8; margin: 8px 0 30px; }
        .list-btn { width: 100%; background: #334155; border: 2px solid #38bdf8; border-radius: 16px; padding: 20px; margin-bottom: 16px; text-align: center; font-weight: 700; color: #f1f5f9; cursor: pointer; transition: 0.2s; }
        .badge { display: block; font-size: 0.8rem; color: #94a3b8; margin-top: 8px; }
        .hidden { display: none !important; }
        .score { background: #334155; padding: 10px; border-radius: 10px; text-align: center; color: #38bdf8; font-weight: 600; margin-bottom: 20px; }
        .verb-card { background: linear-gradient(135deg, #2563eb, #38bdf8); color: white; padding: 40px 20px; border-radius: 20px; font-size: 2.2rem; font-weight: 800; text-align: center; }
        .meaning { text-align: center; font-style: italic; color: #cbd5e1; margin: 20px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { background: #334155; border: 1px solid #475569; padding: 16px; border-radius: 12px; font-weight: 600; cursor: pointer; color: #f1f5f9; }
        .correct { background: #16a34a !important; border-color: #22c55e !important; }
        .wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
        .example { background: #0f172a; border-left: 4px solid #38bdf8; padding: 15px; border-radius: 8px; margin-top: 20px; display: none; }
        .next { background: #38bdf8; color: #0f172a; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; margin-top: 20px; cursor: pointer; display: none; }
        .home-btn { background: #64748b; color: white; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div class="card">
    <div class="container">
        <div id="home">
            <div class="title">🇩🇪 Verb Master</div>
            <div class="sub">Präpositionen: 50 Verbs</div>
            <div class="list-btn" onclick="startQuiz('first')">📘 Liste 1 (Basic) <span class="badge">warten · denken · teilnehmen</span></div>
            <div class="list-btn" onclick="startQuiz('second')">📗 Liste 2 (Pro) <span class="badge">bewerben · abhängen · sich einigen</span></div>
        </div>
        <div id="quiz" class="hidden">
            <div id="scoreText" class="score">Progress: 0 / 25</div>
            <div id="verb" class="verb-card">-</div>
            <div id="mean" class="meaning"></div>
            <div id="options" class="grid"></div>
            <div id="fb" style="text-align:center; margin-top:15px; font-weight:700;"></div>
            <div id="exampleBox" class="example"><div id="exDe" style="font-weight:600;"></div><div id="exEn" style="font-size:0.85rem; color:#94a3b8; margin-top:5px;"></div></div>
            <button id="nextBtn" class="next">NÄCHSTE FRAGE →</button>
        </div>
        <div id="result" class="hidden">
            <div class="title">Fertig! 🎉</div>
            <div id="finalScore" style="font-size:2rem; text-align:center; margin:30px 0; color:#38bdf8;"></div>
            <button onclick="location.reload()" class="home-btn">MENÜYE DÖN</button>
        </div>
    </div>
</div>
