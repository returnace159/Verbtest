<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Verb Master v2.0 - Scalability Edition</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; display: flex; justify-content: center; padding: 20px; color: #f8fafc; }
        .card { background: #1e293b; padding: 25px; border-radius: 24px; width: 100%; max-width: 450px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .btn { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; background: #3b82f6; color: white; }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        .opt { background: #334155; color: #f1f5f9; border: 2px solid #475569; margin: 8px 0; text-align: left; padding-left: 20px; }
        .opt:hover { border-color: #3b82f6; background: #3e4e63; }
        .hidden { display: none; }
        .correct { background: #059669 !important; border-color: #10b981 !important; }
        .wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
        #verb { font-size: 28px; text-align: center; margin: 25px 0; font-weight: 800; color: #60a5fa; text-transform: uppercase; letter-spacing: 1px; }
        #score-text { text-align: center; font-size: 14px; color: #94a3b8; margin-bottom: 10px; }
        #ex-box { margin-top: 20px; padding: 15px; border-radius: 12px; background: #0f172a; border-left: 5px solid #10b981; font-size: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <div id="home">
        <h2 style="text-align:center; margin-bottom:30px;">🇩🇪 DEUTSCHE VERBEN PRO</h2>
        <div id="menu-buttons">
            </div>
    </div>

    <div id="quiz" class="hidden">
        <div id="score-text"></div>
        <div id="verb"></div>
        <div id="options"></div>
        <div id="ex-box" class="hidden">
            <div id="meaning" style="font-weight: bold; color: #10b981; margin-bottom: 5px;"></div>
            <div id="example" style="font-style: italic; color: #cbd5e1;"></div>
        </div>
        <button id="next" class="btn hidden" onclick="nextQ()" style="background:#f59e0b; margin-top:20px;">SIRADAKİ SORU ➔</button>
    </div>

    <div id="res" class="hidden" style="text-align:center">
        <h2 id="res-title">Test Tamamlandı!</h2>
        <div style="font-size: 48px; margin: 20px 0;" id="total"></div>
        <div id="retryArea"></div>
        <button class="btn" onclick="location.reload()" style="background:#475569">ANA MENÜYE DÖN</button>
    </div>
</div>

<script>
    // Parça 2: Fiil Listesi buraya yapıştırılacak
    const MASTER_DATA = {
    "GÜNLÜK HAYAT": [
        {f:"warten", p:"auf", t:"beklemek (Akk)", ex:"Ich warte auf den Bus."},
        {f:"denken", p:"an", t:"düşünmek (Akk)", ex:"Denk an mich!"},
        {f:"glauben", p:"an", t:"inanmak (Akk)", ex:"Ich glaube an dich."},
        {f:"sich freuen (auf)", p:"auf", t:"sevinmek-gelecek (Akk)", ex:"Ich freue mich auf die Party."},
        {f:"sich freuen (über)", p:"über", t:"sevinmek-şu an (Akk)", ex:"Ich freue mich über das Geschenk."},
        {f:"sich interessieren", p:"für", t:"ilgilenmek (Akk)", ex:"Interessierst du dich für Sport?"},
        {f:"sprechen (mit)", p:"mit", t:"konuşmak (Dat)", ex:"Ich spreche mit meinem Vater."},
        {f:"sprechen (über)", p:"über", t:"hakkında konuşmak (Akk)", ex:"Wir sprechen über den Urlaub."},
        {f:"sich erinnern", p:"an", t:"hatırlamak (Akk)", ex:"Erinnerst du dich an den Film?"},
        {f:"achten", p:"auf", t:"dikkat etmek (Akk)", ex:"Achte auf die Straße!"},
        {f:"antworten", p:"auf", t:"cevap vermek (Akk)", ex:"Antworte auf meine Mail."},
        {f:"bitten", p:"um", t:"rica etmek (Akk)", ex:"Darf ich um ein Glas Wasser bitten?"},
        {f:"danken", p:"für", t:"teşekkür etmek (Akk)", ex:"Ich danke dir für alles."},
        {f:"lachen", p:"über", t:"gülmek (Akk)", ex:"Wir lachen über den Witz."},
        {f:"hoffen", p:"auf", t:"ummak (Akk)", ex:"Ich hoffe auf gute Nachrichten."},
        {f:"schreiben", p:"an", t:"yazmak (Akk)", ex:"Ich schreibe an meine Freundin."},
        {f:"sich ärgern", p:"über", t:"kızmak (Akk)", ex:"Ärgerst du dich über den Stau?"},
        {f:"sich gewöhnen", p:"an", t:"alışmak (Akk)", ex:"Ich gewöhne mich an das Wetter."},
        {f:"verzichten", p:"auf", t:"vazgeçmek (Akk)", ex:"Ich verzichte auf den Nachtisch."}
    ],
    "İLERİ SEVİYE & AKADEMİK": [
        {f:"ankommen", p:"auf", t:"bağlı olmak (Akk)", ex:"Es kommt auf deine Hilfe an."},
        {f:"sich bewerben", p:"um", t:"başvurmak (Akk)", ex:"Er bewirbt sich um ein Stipendium."},
        {f:"sich entscheiden", p:"für", t:"karar vermek (Akk)", ex:"Ich entscheide mich für diesen Weg."},
        {f:"sich konzentrieren", p:"auf", t:"odaklanmak (Akk)", ex:"Konzentrier dich auf die Prüfung!"},
        {f:"leiden", p:"an", t:"hastalık çekmek (Dat)", ex:"Er leidet an einer Allergie."},
        {f:"leiden", p:"unter", t:"maruz kalmak (Dat)", ex:"Sie leidet unter dem Lärm."},
        {f:"zweifeln", p:"an", t:"şüphe etmek (Dat)", ex:"Zweifelst du an meiner Treue?"},
        {f:"bestehen", p:"aus", t:"oluşmak (Dat)", ex:"Das Team besteht aus Profis."},
        {f:"bestehen", p:"auf", t:"ısrar etmek (Akk)", ex:"Ich bestehe auf einer Entschuldigung."},
        {f:"diskutieren", p:"mit", t:"tartışmak (Dat)", ex:"Ich diskutiere nicht mit dir."},
        {f:"berichten", p:"über", t:"rapor etmek (Akk)", ex:"Die Zeitung berichtet über den Unfall."},
        {f:"beitragen", p:"zu", t:"katkıda bulunmak (Dat)", ex:"Jeder muss zum Erfolg beitragen."},
        {f:"forschen", p:"nach", t:"araştırmak (Dat)", ex:"Wissenschaftler forschen nach Heilung."},
        {f:"sich spezialisieren", p:"auf", t:"uzmanlaşmak (Akk)", ex:"Er spezialisiert sich auf Chirurgie."}
    ],
    "SOSYAL ETKİLEŞİM": [
        {f:"teilnehmen", p:"an", t:"katılmak (Dat)", ex:"Nimmst du an dem Meeting teil?"},
        {f:"einladen", p:"zu", t:"davet etmek (Dat)", ex:"Ich lade dich zum Essen ein."},
        {f:"gehören", p:"zu", t:"ait olmak (Dat)", ex:"Du gehörst zu unserer Familie."},
        {f:"passen", p:"zu", t:"yakışmak (Dat)", ex:"Das Kleid passt zu dir."},
        {f:"sich unterhalten", p:"mit", t:"sohbet etmek (Dat)", ex:"Ich unterhalte mich mit dem Gast."},
        {f:"sich streiten", p:"mit", t:"kavga etmek (Dat)", ex:"Streite dich nicht mit ihm."},
        {f:"telefonieren", p:"mit", t:"telefonda konuşmak (Dat)", ex:"Ich telefoniere mit meiner Mutter."},
        {f:"sich treffen", p:"mit", t:"buluşmak (Dat)", ex:"Treffen wir uns mit Tom?"},
        {f:"gratulieren", p:"zu", t:"kutlamak (Dat)", ex:"Ich gratuliere dir zum Geburtstag."},
        {f:"helfen", p:"bei", t:"yardım etmek (Dat)", ex:"Kannst du mir beim Tragen helfen?"},
        {f:"fragen", p:"nach", t:"sormak (Dat)", ex:"Er fragt nach dem Weg."},
        {f:"erzählen", p:"von", t:"anlatmak (Dat)", ex:"Erzähl mir von deiner Reise."},
        {f:"trink", p:"auf", t:"şerefine içmek (Akk)", ex:"Trinken wir auf deinen Erfolg!"}
    ],
    "DUYGU & ALGI": [
        {f:"sich verlieben", p:"in", t:"aşık olmak (Akk)", ex:"Er hat sich in sie verliebt."},
        {f:"sich fürchten", p:"vor", t:"korkmak (Dat)", ex:"Ich fürchte mich vor der Dunkelheit."},
        {f:"träumen", p:"von", t:"hayal etmek (Dat)", ex:"Ich träume von einem Haus am Meer."},
        {f:"schmecken", p:"nach", t:"tadı gelmek (Dat)", ex:"Das schmeckt nach Erdbeere."},
        {f:"riechen", p:"nach", t:"kokmak (Dat)", ex:"Hier riecht es nach Kaffee."},
        {f:"sich wundern", p:"über", t:"şaşırmak (Akk)", ex:"Ich wundere mich über dich."},
        {f:"erkennen", p:"an", t:"tanımak (Dat)", ex:"Ich erkenne dich an deiner Stimme."},
        {f:"sich ekeln", p:"vor", t:"iğrenmek (Dat)", ex:"Ich ekle mich vor Spinnen."}
    ]
};

// Scalability Lock Aktivatörü
if(typeof buildMenu === "function") buildMenu(); 

    let current = [], idx = 0, score = 0, wrongList = [];

    // Menüyü dinamik oluştur (Scalability Lock)
    function buildMenu() {
        const menu = document.getElementById('menu-buttons');
        Object.keys(MASTER_DATA).forEach(cat => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = cat + " (" + MASTER_DATA[cat].length + " Fiil)";
            b.onclick = () => start(cat);
            menu.appendChild(b);
        });
    }

    function start(cat) {
        current = [...MASTER_DATA[cat]].sort(() => Math.random() - 0.5);
        idx = 0; score = 0; wrongList = [];
        document.getElementById('home').classList.add('hidden');
        document.getElementById('res').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        show();
    }

    function show() {
        let q = current[idx];
        document.getElementById('score-text').innerText = `İlerleme: ${idx + 1} / ${current.length}`;
        document.getElementById('verb').innerText = q.f;
        document.getElementById('ex-box').classList.add('hidden');
        document.getElementById('next').classList.add('hidden');
        
        let pool = ["auf", "an", "mit", "von", "in", "über", "zu", "für", "nach", "um", "vor", "bei", "aus", "gegen"];
        let opts = [q.p];
        while(opts.length < 4) {
            let r = pool[Math.floor(Math.random() * pool.length)];
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        document.getElementById('options').innerHTML = opts.map(o => 
            `<button class="btn opt" onclick="check(this, '${o}', '${q.p}')">${o}</button>`
        ).join('');
    }

    function check(btn, sel, cor) {
        document.querySelectorAll('.opt').forEach(b => b.disabled = true);
        const q = current[idx];
        if(sel === cor) { 
            btn.classList.add('correct'); 
            score++; 
        } else { 
            btn.classList.add('wrong'); 
            wrongList.push(q);
        }
        document.getElementById('meaning').innerText = q.t;
        document.getElementById('example').innerText = q.ex;
        document.getElementById('ex-box').classList.remove('hidden');
        document.getElementById('next').classList.remove('hidden');
    }

    function nextQ() {
        idx++;
        if(idx < current.length) show();
        else finish();
    }

    function finish() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('res').classList.remove('hidden');
        document.getElementById('total').innerText = `${score} / ${current.length}`;
        const retryArea = document.getElementById('retryArea');
        retryArea.innerHTML = ""; 
        if(wrongList.length > 0) {
            const b = document.createElement('button');
            b.className = "btn"; b.style.background = "#ea580c";
            b.innerText = `HATALARI TEKRARLA (${wrongList.length})`;
            b.onclick = () => {
                current = [...wrongList].sort(() => Math.random() - 0.5);
                idx = 0; score = 0; wrongList = [];
                document.getElementById('res').classList.add('hidden');
                document.getElementById('quiz').classList.remove('hidden');
                show();
            };
            retryArea.appendChild(b);
        }
    }

    // Başlangıçta menüyü kur (Veri gelince çalışacak)
    window.onload = () => { if(Object.keys(MASTER_DATA).length > 0) buildMenu(); };
</script>
</body>
</html>
