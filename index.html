<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Verb Master v1.0</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; background: #2563eb; color: white; }
        .opt { background: white; color: #333; border: 2px solid #ddd; margin: 5px 0; }
        .hidden { display: none; }
        .correct { background: #16a34a; color: white; }
        .wrong { background: #dc2626; color: white; }
        #verb { font-size: 24px; text-align: center; margin: 20px 0; font-weight: bold; color: #2563eb; }
    </style>
</head>
<body>

<div class="card">
    <div id="home">
        <h2 style="text-align:center">🇩🇪 Verb Master</h2>
        <button class="btn" onclick="start('A')">LİSTE 1 (Basic)</button>
        <button class="btn" onclick="start('B')">LİSTE 2 (Advanced)</button>
    </div>

    <div id="quiz" class="hidden">
        <div id="score" style="text-align:center; font-size:12px"></div>
        <div id="verb"></div>
        <div id="options"></div>
        <div id="ex" class="hidden" style="margin-top:15px; padding:10px; border-left:4px solid #16a34a; background:#f0fdf4; font-size:14px"></div>
        <button id="next" class="btn hidden" onclick="nextQ()" style="background:#0f172a">SIRADAKİ SORU</button>
    </div>

    <div id="res" class="hidden" style="text-align:center">
        <h2>Bitti! 🎉</h2>
        <h1 id="total"></h1>
        <button class="btn" onclick="location.reload()">BAŞA DÖN</button>
    </div>
</div>

<script>
    const data = {
        A: [
            {f:"warten", p:"auf", t:"beklemek", ex:"Ich warte auf dich."},
            {f:"denken", p:"an", t:"düşünmek", ex:"Ich denke an dich."},
            {f:"glauben", p:"an", t:"inanmak", ex:"Glaubst du an mich?"},
            {f:"teilnehmen", p:"an", t:"katılmak", ex:"Nimmst du an dem Kurs teil?"}
        ],
        B: [
            {f:"sich freuen", p:"auf", t:"sevinmek (gelecek)", ex:"Ich freue mich auf den Urlaub."},
            {f:"sich erinnern", p:"an", t:"hatırlamak", ex:"Erinnerst du dich an den Film?"},
            {f:"ankommen", p:"auf", t:"bağlı olmak", ex:"Es kommt auf das Wetter an."}
        ]
    };

    let current = [], idx = 0, score = 0;

    function start(list) {
        current = data[list].sort(() => Math.random() - 0.5);
        document.getElementById('home').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        show();
    }

    function show() {
        let q = current[idx];
        document.getElementById('score').innerText = `Soru: ${idx+1}/${current.length}`;
        document.getElementById('verb').innerText = q.f;
        document.getElementById('ex').classList.add('hidden');
        document.getElementById('next').classList.add('hidden');
        
        let opts = [q.p, "in", "mit", "von"].sort(() => Math.random() - 0.5);
        let html = "";
        opts.forEach(o => {
            html += `<button class="btn opt" onclick="check(this, '${o}', '${q.p}')">${o}</button>`;
        });
        document.getElementById('options').innerHTML = html;
    }

    function check(btn, sel, cor) {
        document.querySelectorAll('.opt').forEach(b => b.disabled = true);
        if(sel === cor) { btn.classList.add('correct'); score++; }
        else { btn.classList.add('wrong'); }
        
        document.getElementById('ex').innerText = current[idx].ex;
        document.getElementById('ex').classList.remove('hidden');
        document.getElementById('next').classList.remove('hidden');
    }

    function nextQ() {
        idx++;
        if(idx < current.length) show();
        else {
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('res').classList.remove('hidden');
            document.getElementById('total').innerText = `${score} / ${current.length}`;
        }
    }
</script>
</body>
</html>
