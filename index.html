<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Verb Master v2.0 - Scalability Edition</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; background: #2563eb; color: white; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        .opt { background: white; color: #333; border: 2px solid #ddd; margin: 5px 0; }
        .hidden { display: none; }
        .correct { background: #16a34a !important; color: white; }
        .wrong { background: #dc2626 !important; color: white; }
        #verb { font-size: 28px; text-align: center; margin: 20px 0; font-weight: bold; color: #2563eb; }
        .menu-title { text-align: center; color: #1e293b; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="home">
        <h2 class="menu-title">🇩🇪 Verb Master Pro</h2>
        <div id="menuButtons"></div>
    </div>

    <div id="quiz" class="hidden">
        <div id="score" style="text-align:center; font-size:12px; color: #64748b"></div>
        <div id="verb"></div>
        <div id="options"></div>
        <div id="ex" class="hidden" style="margin-top:15px; padding:10px; border-left:4px solid #16a34a; background:#f0fdf4; font-size:14px"></div>
        <button id="next" class="btn hidden" onclick="nextQ()" style="background:#0f172a">SIRADAKİ SORU</button>
    </div>

    <div id="res" class="hidden" style="text-align:center">
        <h2>Bitti! 🎉</h2>
        <h1 id="total"></h1>
        <div id="retryArea"></div>
        <button class="btn" onclick="showMenu()" style="background:#64748b">ANA MENÜYE DÖN</button>
    </div>
</div>

<script>
    // SCALABILITY LOCK: Buraya 1000 fiil bile atsan sistem bozulmaz.
    const MASTER_DATA = [
        // Mevcut 60 Fiil (Örnek Kesit)
        {f:"warten", p:"auf", t:"beklemek (Akk)", ex:"Ich warte auf dich."},
        {f:"denken", p:"an", t:"düşünmek (Akk)", ex:"Ich denke an dich."},
        {f:"glauben", p:"an", t:"inanmak (Akk)", ex:"Glaubst du an Gott?"},
        {f:"teilnehmen", p:"an", t:"katılmak (Dat)", ex:"Er nimmt an dem Kurs teil."},
        {f:"sich freuen (auf)", p:"auf", t:"sevinmek-gelecek (Akk)", ex:"Ich freue mich auf den Urlaub."},
        {f:"sich freuen (über)", p:"über", t:"sevinmek-şu an (Akk)", ex:"Ich freue mich über das Geschenk."},
        {f:"sich interessieren", p:"für", t:"ilgilenmek (Akk)", ex:"Interessierst du dich für Musik?"},
        {f:"sprechen (mit)", p:"mit", t:"konuşmak (Dat)", ex:"Ich spreche mit meinem Chef."},
        {f:"sprechen (über)", p:"über", t:"hakkında konuşmak (Akk)", ex:"Wir sprechen über den Plan."},
        {f:"sich erinnern", p:"an", t:"hatırlamak (Akk)", ex:"Erinnerst du dich an mich?"},
        {f:"ankommen", p:"auf", t:"bağlı olmak (Akk)", ex:"Es kommt auf das Wetter an."},
        {f:"achten", p:"auf", t:"dikkat etmek (Akk)", ex:"Achte auf die Schilder!"},
        {f:"antworten", p:"auf", t:"cevap vermek (Akk)", ex:"Antworte auf meine question."},
        {f:"bitten", p:"um", t:"rica etmek (Akk)", ex:"Darf ich um Hilfe bitten?"},
        {f:"danken", p:"für", t:"teşekkür etmek (Akk)", ex:"Ich danke dir für die Blumen."},
        {f:"einladen", p:"zu", t:"davet etmek (Dat)", ex:"Ich lade dich zu mir ein."},
        {f:"gehören", p:"zu", t:"ait olmak (Dat)", ex:"Du gehörst zu mir."},
        {f:"lachen", p:"über", t:"gülmek (Akk)", ex:"Wir lachen über den Witz."},
        {f:"passen", p:"zu", t:"yakışmak (Dat)", ex:"Das passt zu dir."},
        {f:"sich ärgern", p:"über", t:"kızmak (Akk)", ex:"Er ärgert sich über den Stau."},
        
        // YENİ EKLENEN FİİLLER (Benzemeyen & Akk/Dat Edatlı)
        {f:"anfangen", p:"mit", t:"başlamak (Dat)", ex:"Wann fängst du mit der Arbeit an?"},
        {f:"sich beschweren", p:"über", t:"şikayet etmek (Akk)", ex:"Der Gast beschwert sich über das Essen."},
        {f:"träumen", p:"von", t:"hayal kurmak/rüya görmek (Dat)", ex:"Ich träume von einer Weltreise."},
        {f:"sich verlassen", p:"auf", t:"güvenmek (Akk)", ex:"Ich verlasse mich auf dich."},
        {f:"sich gewöhnen", p:"an", t:"alışmak (Akk)", ex:"Ich gewöhne mich an das frühe Aufstehen."},
        {f:"verzichten", p:"auf", t:"vazgeçmek/feragat etmek (Akk)", ex:"Ich verzichte auf den Nachtisch."},
        {f:"leiden", p:"unter", t:"muzdarip olmak (Dat)", ex:"Er leidet unter dem Lärm."},
        {f:"sich unterhalten", p:"über", t:"sohbet etmek (Akk)", ex:"Wir unterhalten uns über den Film."},
        {f:"sich vorbereiten", p:"auf", t:"hazırlanmak (Akk)", ex:"Bereitest du dich auf die Prüfung vor?"},
        {f:"helfen", p:"bei", t:"yardım etmek (Dat)", ex:"Hilfst du mir bei den Hausaufgaben?"},
        {f:"sich entscheiden", p:"für", t:"karar vermek (Akk)", ex:"Ich entscheide mich für das rote Auto."},
        {f:"gehören", p:"zu", t:"ait olmak (Dat)", ex:"Österreich gehört zur EU."},
        {f:"sich bewerben", p:"um", t:"başvurmak (Akk)", ex:"Er bewirbt sich um ein Stipendium."},
        {f:"zählen", p:"auf", t:"güvenmek/saymak (Akk)", ex:"Ich zähle auf deine Unterstützung."},
        {f:"erkennen", p:"an", t:"-den tanımak (Dat)", ex:"Ich erkenne ihn an seiner Stimme."},
        {f:"warnen", p:"vor", t:"-e karşı uyarmak (Dat)", ex:"Man warnt uns vor dem Sturm."},
        {f:"passen", p:"zu", t:"-e uygun olmak (Dat)", ex:"Die Krawatte passt zum Hemd."},
        {f:"schmecken", p:"nach", t:"- tadı gelmek (Dat)", ex:"Der Tee schmeckt nach Honig."},
        {f:"riechen", p:"nach", t:"- kokmak (Dat)", ex:"Es riecht nach frischem Brot."},
        {f:"sich fürchten", p:"vor", t:"-den korkmak (Dat)", ex:"Sie fürchtet sich vor Spinnen."}
        
        // NOT: Buraya dilediğin kadar fiil eklemeye devam edebilirsin. 
        // Kod otomatik olarak 20'li gruplara bölecektir.
    ];

    let currentTestSet = [], idx = 0, score = 0, wrongList = [];
    const ITEMS_PER_PAGE = 20;

    // Sayfa yüklendiğinde menüyü oluştur
    window.onload = showMenu;

    function showMenu() {
        document.getElementById('home').classList.remove('hidden');
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('res').classList.add('hidden');
        
        const menuContainer = document.getElementById('menuButtons');
        menuContainer.innerHTML = "";
        
        const totalPages = Math.ceil(MASTER_DATA.length / ITEMS_PER_PAGE);
        
        for (let i = 0; i < totalPages; i++) {
            let startIdx = i * ITEMS_PER_PAGE;
            let endIdx = Math.min(startIdx + ITEMS_PER_PAGE, MASTER_DATA.length);
            
            let btn = document.createElement('button');
            btn.className = "btn";
            btn.innerText = `TEST ${i + 1} (${startIdx + 1}-${endIdx})`;
            btn.onclick = () => startTest(startIdx, endIdx);
            menuContainer.appendChild(btn);
        }
    }

    function startTest(start, end) {
        currentTestSet = MASTER_DATA.slice(start, end).sort(() => Math.random() - 0.5);
        initQuiz();
    }

    function initQuiz() {
        idx = 0; score = 0; wrongList = [];
        document.getElementById('home').classList.add('hidden');
        document.getElementById('res').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        let q = currentTestSet[idx];
        document.getElementById('score').innerText = `Soru: ${idx + 1} / ${currentTestSet.length}`;
        document.getElementById('verb').innerText = q.f;
        document.getElementById('ex').classList.add('hidden');
        document.getElementById('next').classList.add('hidden');
        
        const pool = ["auf", "an", "mit", "von", "in", "über", "zu", "für", "nach", "um", "vor", "bei", "unter"];
        let opts = [q.p];
        while(opts.length < 4) {
            let r = pool[Math.floor(Math.random() * pool.length)];
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        let html = "";
        opts.forEach(o => {
            html += `<button class="btn opt" onclick="handleAnswer(this, '${o}', '${q.p}')">${o}</button>`;
        });
        document.getElementById('options').innerHTML = html;
    }

    function handleAnswer(btn, selected, correct) {
        document.querySelectorAll('.opt').forEach(b => b.disabled = true);
        if(selected === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            wrongList.push(currentTestSet[idx]);
            // Doğru olanı da yeşil yapalım ki kullanıcı öğrensin
            document.querySelectorAll('.opt').forEach(b => {
                if(b.innerText === correct) b.classList.add('correct');
            });
        }
        document.getElementById('ex').innerText = `${currentTestSet[idx].t}: ${currentTestSet[idx].ex}`;
        document.getElementById('ex').classList.remove('hidden');
        document.getElementById('next').classList.remove('hidden');
    }

    function nextQ() {
        idx++;
        if(idx < currentTestSet.length) renderQuestion();
        else showResults();
    }

    function showResults() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('res').classList.remove('hidden');
        document.getElementById('total').innerText = `${score} / ${currentTestSet.length}`;
        
        const retryArea = document.getElementById('retryArea');
        retryArea.innerHTML = "";

        if(wrongList.length > 0) {
            let retryBtn = document.createElement('button');
            retryBtn.className = "btn";
            retryBtn.style.background = "#ea580c"; 
            retryBtn.innerText = `SADECE HATALARI TEKRARLA (${wrongList.length})`;
            retryBtn.onclick = function() {
                currentTestSet = [...wrongList].sort(() => Math.random() - 0.5);
                initQuiz();
            };
            retryArea.appendChild(retryBtn);
        }
    }
</script>
</body>
</html>
