<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Verb Master - Professional Edition</title>
    <style>
        /* Modern Mühendislik Teması */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f172a; /* Koyu, modern arka plan */
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #f1f5f9;
        }
        .card {
            background: #1e293b; /* Kart rengi */
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid #334155;
            overflow: hidden;
        }
        .container {
            padding: 30px;
        }
        .title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #38bdf8; /* Parlak mavi başlık */
            text-align: center;
            letter-spacing: -1px;
        }
        .sub {
            text-align: center;
            color: #94a3b8;
            font-weight: 500;
            margin: 8px 0 30px;
            font-size: 1rem;
        }
        .list-btn {
            width: 100%;
            background: #334155;
            border: 2px solid #38bdf8;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: #f1f5f9;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .list-btn:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: translateY(-2px);
        }
        .badge {
            display: block;
            font-size: 0.8rem;
            font-weight: normal;
            color: #94a3b8;
            margin-top: 8px;
        }
        .info {
            background: rgba(56, 189, 248, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin-top: 25px;
            font-size: 0.8rem;
            color: #38bdf8;
            text-align: center;
            line-height: 1.5;
        }
        .hidden { display: none; }
        .score {
            background: #334155;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            color: #38bdf8;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .verb-card {
            background: linear-gradient(135deg, #2563eb, #38bdf8);
            color: white;
            padding: 40px 20px;
            border-radius: 20px;
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }
        .meaning {
            text-align: center;
            font-style: italic;
            color: #cbd5e1;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .opt {
            background: #334155;
            border: 1px solid #475569;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            color: #f1f5f9;
            font-size: 1.1rem;
            transition: 0.2s;
        }
        .opt:hover { background: #475569; }
        .correct { background: #16a34a !important; border-color: #22c55e !important; }
        .wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
        .example {
            background: #0f172a;
            border-left: 4px solid #38bdf8;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            color: #f1f5f9;
        }
        .next {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            margin-top: 20px;
            cursor: pointer;
            display: none;
        }
        .home-btn { background: #64748b; color: white; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

        <div id="result" class="hidden">

            <button onclick="location.reload()" class="home-btn">MENÜYE DÖN</button>
        </div>
    </div>
</div>
